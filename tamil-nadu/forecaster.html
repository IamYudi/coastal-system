<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coastal Forecaster | MoWE</title>
    <style>
        :root {
            --primary: #3498db;
            --bg: #0f1215;
            --card-bg: rgba(28, 34, 41, 0.9);
        }
        body { 
            background: var(--bg); 
            color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            padding: 15px 20px;
            background: var(--card-bg);
            border-bottom: 1px solid #2c3e50;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-link { color: var(--primary); text-decoration: none; font-weight: bold; }
        
        /* The AI Container */
        .ai-frame-container {
            flex-grow: 1;
            width: 100%;
            border: none;
            overflow: hidden;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .ai-status {
            padding: 10px 20px;
            font-size: 0.8rem;
            background: #1c2229;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="conditions.html" class="back-link">← BACK TO RADAR</a>
        <div style="text-align: right;">
            <span style="color: #f1c40f; font-weight: bold;">MoWE AI ENGINE</span><br>
            <span style="font-size: 0.7rem;">Mixture of Weather Experts v1</span>
        </div>
    </div>

    <div class="ai-status">
        Connected to Hugging Face Inference Node... Analyzing GraphCast & FuXi Models.
    </div>

    <div class="ai-frame-container">
        <!-- Embedding the MoWE Space directly -->
        <iframe 
            src="https://farnasirim-mowe-weather-v1.hf.space" 
            allow="accelerometer; ambient-light-sensor; camera; encrypted-media; geolocation; gyroscope; hid; microphone; midi; payment; usb; vr; xr-spatial-tracking"
            sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-downloads"
        ></iframe>
    </div>

</body>
</html>
