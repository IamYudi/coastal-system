<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coastal Tac-Intel | Forecaster Node</title>
    <style>
        :root {
            --primary-accent: #00ff41;
            --warning-accent: #ffae00;
            --bg-deep: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
        }

        /* Fixed Header for Mobile */
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--panel-bg);
            border-bottom: 2px solid var(--border-color);
            z-index: 100;
        }

        .nav-left a {
            color: var(--primary-accent);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.75rem;
            border: 1px solid var(--primary-accent);
            padding: 8px;
            display: inline-block;
        }

        .node-status { text-align: right; line-height: 1.2; }

        /* The Chat Container - Fixed Height for Mobile */
        .ai-container {
            flex: 1;
            width: 100%;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Tactical Footer - Stacked on Mobile */
        .footer-bar {
            padding: 10px;
            background: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            font-size: 0.6rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .warning-text {
            grid-column: span 2;
            color: var(--warning-accent);
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 5px;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .header-nav { padding: 10px; }
            .node-status span { font-size: 0.6rem !important; }
        }
    </style>
</head>
<body>

    <header class="header-nav">
        <div class="nav-left">
            <a href="index.html">← RADAR EXIT</a>
        </div>
        <div class="node-status">
            <span style="font-size: 0.6rem; color: #8b949e;">UPLINK: SECURE</span><br>
            <span style="font-size: 0.7rem; color: var(--primary-accent); font-weight: bold;">NODE-2.5-FLASH</span>
        </div>
    </header>

    <main class="ai-container">
        <!-- Added container relative positioning to prevent iframe from jumping -->
        <iframe 
            src="https://viv81-coastal-ai-backend.hf.space/?__theme=dark" 
            allow="accelerometer; gyroscope; microphone;">
        </iframe>
    </main>

    <footer class="footer-bar">
        <div class="warning-text">⚠️ CROSS-VERIFY WITH IMD/INCOIS LIVE DATA,<br>THE AI MAY MAKE MISTAKES</div>
        <div>LOC: SECTOR-TN-GOA</div>
        <div style="text-align: right;">VER: 1.1.0-MOBILE</div>
    </footer>

    <script>
        // CRITICAL: Prevent the StormGlass API prompt from breaking the UI on mobile
        // If you are hardcoding the key, ensure it's in your main JS. 
        // This script ensures the page doesn't hang if the key is missing.
        window.addEventListener('load', () => {
            console.log("Tactical Mobile UI Initialized.");
        });
    </script>
</body>
</html>
