<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Coastal Conditions | Chennai</title>
    <!-- Add these rows inside your Swell and Wind cards -->
<div class="metric-row">
    <span class="label">Wave Duration (Period)</span>
    <span id="wave-period" class="value">--s</span>
</div>
<div class="metric-row">
    <span class="label">Wind Speed</span>
    <span id="wind-spd" class="value">--kts</span>
</div>

<!-- TOP STATUS BAR (Add below the dropdown) -->
<div style="font-size: 0.75rem; color: #7f8c8d; margin-top: 10px;">
    Last Update: <span id="last-updated" style="color: #3498db;">--:--:--</span> | 
    Next Update In: <span id="next-update" style="color: #f1c40f;">30:00</span>
</div>

<script>
    let timeLeft = 1800; // 30 minutes in seconds

    function updateDashboard() {
        const source = document.getElementById('api-selector').value;
        const now = new Date();
        
        // Update Timestamps
        document.getElementById('last-updated').innerText = now.toLocaleTimeString();
        timeLeft = 1800; // Reset timer to 30 mins

        // Mock Logic (Replace with actual fetch later)
        if (source === 'stormglass') {
            document.getElementById('tide-val').innerHTML = "1.1<span class='unit'>m</span>";
            document.getElementById('swell-val').innerHTML = "0.9<span class='unit'>m</span>";
            document.getElementById('wave-period').innerText = "10.5s";
            document.getElementById('wind-spd').innerText = "12kts";
        } else {
            document.getElementById('tide-val').innerHTML = "1.3<span class='unit'>m</span>";
            document.getElementById('swell-val').innerHTML = "0.7<span class='unit'>m</span>";
            document.getElementById('wave-period').innerText = "6.2s";
            document.getElementById('wind-spd').innerText = "15kts";
        }
    }

    // Countdown Timer Logic
    setInterval(function() {
        timeLeft--;
        if (timeLeft <= 0) {
            updateDashboard();
        }
        
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        document.getElementById('next-update').innerText = 
            `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }, 1000);

    // Initial Trigger
    updateDashboard();
</script>
</head>
<body>

    <div class="top-nav">
        <a href="chennai.html" style="color: #3498db; text-decoration: none;">← MAP VIEW</a>
        
        <div class="controls">
            <select id="api-selector" onchange="updateDataSource()">
                <option value="stormglass">Engine: StormGlass (Primary Marine)</option>
                <option value="openweather">Engine: OpenWeather (Atmospheric)</option>
            </select>
        </div>

        <!-- VERIFIED GOVERNMENT LINK -->
        <a href="https://incois.gov.in/portal/osf/osf.jsp" target="_blank" class="gov-link">
            EXTERNAL: OFFICIAL INCOIS FORECAST ↗
        </a>
    </div>

    <div class="dashboard">
        <!-- TIDE CARD -->
        <div class="card">
            <div class="card-header">Live Tide Status</div>
            <div id="tide-val" class="data-value">--<span style="font-size: 1rem; color: #7f8c8d;">m</span></div>
            <p id="tide-source" style="font-size: 0.7rem; color: #555;">Select source to pull data</p>
        </div>

        <!-- SWELL CARD -->
        <div class="card" style="border-color: #2ecc71;">
            <div class="card-header" style="color: #2ecc71;">Swell Intelligence</div>
            <div id="swell-val" class="data-value">--<span style="font-size: 1rem; color: #7f8c8d;">m</span></div>
            <p id="swell-source" style="font-size: 0.7rem; color: #555;">Waiting for engine command...</p>
        </div>
    </div>

    <script>
        function updateDataSource() {
            const source = document.getElementById('api-selector').value;
            const tideVal = document.getElementById('tide-val');
            const swellVal = document.getElementById('swell-val');

            if (source === 'stormglass') {
                // Mock data for now - This is where the Fetch code goes
                tideVal.innerHTML = "1.1<span style='font-size: 1rem;'>m</span>";
                swellVal.innerHTML = "0.9<span style='font-size: 1rem;'>m</span>";
                document.getElementById('tide-source').innerText = "Source: StormGlass.io (Sourced from global buoys)";
            } else {
                tideVal.innerHTML = "1.3<span style='font-size: 1rem;'>m</span>";
                swellVal.innerHTML = "0.6<span style='font-size: 1rem;'>m</span>";
                document.getElementById('tide-source').innerText = "Source: OpenWeather (Sourced from airport stations)";
            }
        }
        
        // Run once on load
        updateDataSource();
    </script>
</body>
</html>
