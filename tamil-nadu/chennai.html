<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamil Nadu Coastal Intelligence Hub</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #0f1215; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        #sidebar { 
            position: absolute; top: 10px; right: 10px; width: 320px; 
            max-height: 90vh; background: rgba(15, 18, 21, 0.98); z-index: 1000;
            border: 1px solid #3498db; border-radius: 8px; padding: 15px;
            transition: 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
        }
        
        .toggle-btn { cursor: pointer; color: #3498db; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #2c3e50; padding-bottom: 5px; }
        #content-area { overflow-y: auto; flex-grow: 1; }
        
        .beach-link { 
            display: block; padding: 12px; margin: 8px 0; background: #1c2229;
            border-left: 3px solid #3498db; cursor: pointer; font-size: 0.9rem;
        }
        .beach-link:hover { background: #2c3e50; }

        .intel-header { color: #f1c40f; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #f1c40f; padding-bottom: 5px; }
        .section-title { color: #3498db; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin-top: 12px; display: block; }
        .intel-text { font-size: 0.85rem; line-height: 1.4; margin-bottom: 5px; color: #ced4da; }
        .danger-box { background: rgba(231, 76, 60, 0.2); border: 1px solid #e74c3c; padding: 8px; margin-top: 10px; border-radius: 4px; }
        .exit-footer { font-size: 0.75rem; color: #7f8c8d; text-align: center; margin-top: 15px; font-style: italic; border-top: 1px solid #2c3e50; padding-top: 10px; }

        .back-btn { position: absolute; top: 10px; left: 50px; z-index: 1000; background: #1c2229; color: #3498db; padding: 8px 15px; text-decoration: none; border-radius: 4px; border: 1px solid #3498db; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <a href="../index.html" class="back-btn">← COMMAND CENTER</a>

    <div id="sidebar">
        <span class="toggle-btn" id="sidebar-title" onclick="showList()">☰ REGIONAL INDEX</span>
        <div id="content-area"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    var map = L.map('map', { zoomControl: false }).setView([12.95, 80.27], 10);
    L.control.zoom({ position: 'topleft' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const beachData = [
        { 
            name: "Ennore Creek", 
            coords: [13.2201, 80.3233], 
            tide: "Best at incoming mid-tide. Low tide exposes heavy industrial silt and debris.",
            seasons: "Monsoon (Oct-Dec) is dangerous due to river runoff and unpredictable currents.",
            stay: "Limited local options; stay in North Chennai/Manali for early access.",
            avoid: "High industrial pollution; avoid water contact after heavy rains.",
            crowds: "Very low; mostly local fishermen."
        },
        { 
            name: "Marina Beach", 
            coords: [13.0500, 80.2824], 
            tide: "Incoming tide creates a heavy shorebreak. The drop-off is sudden.",
            seasons: "Summer (April-Aug) is relatively calm. Monsoon creates lethal rip currents.",
            stay: "Stay in Mylapore or Santhome for the closest tactical proximity.",
            avoid: "Do not venture deep; the shelf shift is aggressive and unpredictable.",
            crowds: "Extreme (Thousands). Scouting must be done at dawn (05:00)."
        },
        { 
            name: "Elliot's (Besant Nagar)", 
            coords: [13.0012, 80.2748], 
            tide: "Best at high tide push. The sandbar at the southern end is key.",
            seasons: "Consistent shorebreak in Summer months.",
            stay: "Excellent boutique stays and Airbnbs directly in Besant Nagar.",
            avoid: "Watch for the storm water drain area during Monsoon—currents swirl here.",
            crowds: "High on evenings; moderate during early mornings."
        },
        { 
            name: "Thiruvanmiyur", 
            coords: [12.9830, 80.2680], 
            tide: "Cleanest at mid-tide. Low tide creates a wide, flat 'mushy' wave.",
            seasons: "Good for longboarding in the transition months (Sept-Oct).",
            stay: "High-end residential area; plenty of private rental options.",
            avoid: "Stray dogs can be territorial in the early hours.",
            crowds: "Moderate; popular with local runners and fitness groups."
        },
        { 
            name: "Kottivakkam/Palavakkam", 
            coords: [12.9650, 80.2580], 
            tide: "Similar to Thiruvanmiyur; requires a strong swell to work.",
            seasons: "Best 'ground swells' hit here during mid-summer.",
            stay: "Stay in ECR-adjacent villas for the best logistics.",
            avoid: "Hidden debris in the sand—footwear recommended until the shoreline.",
            crowds: "Low to Moderate; very peaceful on weekdays."
        },
        { 
            name: "Kovalam (Covelong)", 
            coords: [12.7888, 80.2511], 
            tide: "The Point works best at mid-to-high. The Bay is safe at all tides.",
            seasons: "April to Sept is prime surf season. October brings wind-swell.",
            stay: "Dedicated surf camps and luxury resorts (Taj) right on the cove.",
            avoid: "Rocks at the north point. Do not surf the point alone without scouting.",
            crowds: "High. The primary hub for the regional surf community."
        },
        { 
            name: "Muttukadu", 
            coords: [12.8250, 80.2450], 
            tide: "The river mouth creates a unique sandbar that shifts every month.",
            seasons: "Highly dependent on the river mouth being open or closed.",
            stay: "Boating resorts nearby; good for quick tactical stopovers.",
            avoid: "Strong back-currents near the bridge pylons.",
            crowds: "Low on the beach side; high on the backwater side."
        },
        { 
            name: "Mahabalipuram", 
            coords: [12.616, 80.193], 
            tide: "Incoming tide is mandatory to surf over the granite ruins safely.",
            seasons: "World-class 'Right Point' waves in June/July.",
            stay: "Backpacker hostels and guesthouses near the Shore Temple.",
            avoid: "Granite boulders underwater. Getting caught inside is a physical hazard.",
            crowds: "Tourist heavy on land; water is usually just 5-10 surfers."
        }
    ];

    const contentArea = document.getElementById('content-area');
    const sidebarTitle = document.getElementById('sidebar-title');

    function showList() {
        sidebarTitle.innerText = "☰ REGIONAL INDEX";
        contentArea.innerHTML = "";
        beachData.forEach(beach => {
            const link = document.createElement('div');
            link.className = 'beach-link';
            link.innerText = beach.name.toUpperCase();
            link.onclick = (e) => { e.stopPropagation(); selectBeach(beach); };
            contentArea.appendChild(link);
        });
    }

    function selectBeach(beach) {
        map.flyTo(beach.coords, 14);
        sidebarTitle.innerText = "← BACK TO LIST";
        contentArea.innerHTML = `
            <div class="intel-header">${beach.name}</div>
            <span class="section-title">Tide Intelligence</span><p class="intel-text">${beach.tide}</p>
            <span class="section-title">Seasonal Shifts</span><p class="intel-text">${beach.seasons}</p>
            <span class="section-title">Logistics</span><p class="intel-text">${beach.stay}</p>
            <span class="section-title">Expected Crowd</span><p class="intel-text">${beach.crowds}</p>
            <div class="danger-box">
                <span class="section-title" style="color:#ff4d4d; margin-top:0;">DANGER MITIGATION</span>
                <p class="intel-text">${beach.avoid}</p>
            </div>
            <div class="exit-footer">Click anywhere else on the map to exit</div>
        `;
    }

    beachData.forEach(beach => {
        const marker = L.marker(beach.coords).addTo(map);
        marker.on('mouseover', function() { this.bindPopup(`<b>${beach.name}</b>`).openPopup(); });
        marker.on('click', function(e) { L.DomEvent.stopPropagation(e); selectBeach(beach); });
    });

    map.on('click', function() { showList(); });
    showList();
</script>
</body>
</html>
