<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamil Nadu Coastal Intelligence Hub</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #0f1215; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* Tactical Sidebar */
        #sidebar { 
            position: absolute; top: 10px; right: 10px; width: 300px; 
            max-height: 90vh; background: rgba(20, 24, 28, 0.95); z-index: 1000;
            border: 1px solid #3498db; border-radius: 8px; padding: 15px;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
        }
        #sidebar.minimized { width: 40px; height: 40px; overflow: hidden; padding: 5px; }
        .toggle-btn { cursor: pointer; color: #3498db; font-weight: bold; margin-bottom: 10px; display: block; border-bottom: 1px solid #2c3e50; padding-bottom: 5px; }
        
        #beach-list { overflow-y: auto; flex-grow: 1; }
        .beach-link { 
            display: block; padding: 10px; margin: 8px 0; background: #1c2229;
            border-left: 3px solid #3498db; cursor: pointer; font-size: 0.85rem;
            transition: 0.2s;
        }
        .beach-link:hover { background: #2c3e50; border-left: 3px solid #f1c40f; }
        
        .danger-tag { color: #e74c3c; font-size: 0.7rem; display: block; margin-top: 4px; font-weight: bold; text-transform: uppercase; }
        .time-tag { color: #2ecc71; font-size: 0.7rem; display: block; margin-top: 2px; }
        
        .back-btn { position: absolute; top: 10px; left: 50px; z-index: 1000; background: #1c2229; color: #3498db; padding: 8px 15px; text-decoration: none; border-radius: 4px; border: 1px solid #3498db; font-size: 0.8rem; font-weight: bold; }
        .back-btn:hover { background: #3498db; color: white; }

        /* Custom Popup Styling */
        .leaflet-popup-content-wrapper { background: #1c2229; color: white; border: 1px solid #3498db; }
        .leaflet-popup-tip { background: #3498db; }
    </style>
</head>
<body>

    <a href="../index.html" class="back-btn">← COMMAND CENTER</a>

    <div id="sidebar">
        <span class="toggle-btn" onclick="document.getElementById('sidebar').classList.toggle('minimized')">☰ REGIONAL INDEX</span>
        <div id="beach-list">
            <!-- JavaScript populates this list automatically -->
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initial view shows the full Tamil Nadu coastline
        var map = L.map('map', { zoomControl: false }).setView([11.5, 79.5], 7);
        L.control.zoom({ position: 'topleft' }).addTo(map);

        // Dark Tactical Map Tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap | Coastal Intelligence'
        }).addTo(map);

        // Unified Coastal Intelligence Data
        const beachData = [
            { name: "Marina", coords: [13.0500, 80.2824], danger: "Extreme Rips / Steep Drop-offs", time: "6:30 AM (Incoming Tide)" },
            { name: "Adyar River Mouth", coords: [13.0125, 80.2755], danger: "High-Velocity Outflow / Shifting Sand", time: "Low Tide (Scouting Only)" },
            { name: "Besant Nagar", coords: [12.9996, 80.2723], danger: "Current Siphons near Broken Bridge", time: "Early Morning (Offshore Winds)" },
            { name: "Thiruvanmiyur", coords: [12.9700, 80.2600], danger: "Heavy Shorebreak / Spinal Hazard", time: "Mid-Tide Rising" },
            { name: "Akkarai / VGP", coords: [12.9000, 80.2450], danger: "Submerged Granite Boulders", time: "Low Tide (To see hazards)" },
            { name: "Kovalam", coords: [12.7888, 80.2511], danger: "Reef-break Rocks / Clashing Currents", time: "2 Hours Before High Tide" },
            { name: "Mahabalipuram", coords: [12.616, 80.193], danger: "Submerged Temple Structures / Granite Slabs", time: "Mid-Tide (Rising)" },
            { name: "Pondicherry Rock", coords: [11.934, 79.835], danger: "Sea Wall Turbulence / Sharp Oyster Beds", time: "Morning (Calm Water)" },
            { name: "Nagapattinam", coords: [10.763, 79.851], danger: "Delta Siltation / Erratic Seabed", time: "High Tide (Stability)" },
            { name: "Dhanushkodi", coords: [9.155, 79.434], danger: "Ghost Currents / Two-Sea Intersection", time: "Dawn (Maximum Visibility)" }
        ];

        const listContainer = document.getElementById('beach-list');

        beachData.forEach(beach => {
            // 1. Add Intelligence Marker
            L.marker(beach.coords).addTo(map)
                .bindPopup(`
                    <strong style="color:#3498db; font-size:1.1rem;">${beach.name}</strong><br><br>
                    <b style="color:#e74c3c;">DANGER:</b> ${beach.danger}<br>
                    <b style="color:#2ecc71;">BEST ARRIVAL:</b> ${beach.time}
                `);

            // 2. Add to Automated Sidebar Index
            const item = document.createElement('div');
            item.className = 'beach-link';
            item.innerHTML = `
                ${beach.name.toUpperCase()}
                <span class="danger-tag">${beach.danger.split(' / ')[0]}</span>
                <span class="time-tag">⏱ ${beach.time}</span>
            `;
            item.onclick = () => {
                map.flyTo(beach.coords, 14, { duration: 2 });
            };
            listContainer.appendChild(item);
        });

        function flyTo(lat, lng) {
            map.flyTo([lat, lng], 14, { duration: 1.5 });
        }
    </script>
</body>
</html>
