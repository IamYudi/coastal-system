<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOA LOGISTICS | Coastal Tactical Intelligence</title>
    <style>
        :root {
            --bg: #0a0f16;
            --card: #111827;
            --accent: #38bdf8;
            --warning: #fbbf24;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .back-btn { color: var(--accent); text-decoration: none; font-weight: bold; }
        h1 { margin: 0; color: #38bdf8; }
        
        .card {
            background: var(--card);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }
        select {
            width: 100%;
            padding: 14px;
            background: #1e2937;
            color: white;
            border: 1px solid var(--accent);
            border-radius: 8px;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        .section {
            margin-bottom: 22px;
            padding-bottom: 18px;
            border-bottom: 1px solid #334155;
        }
        .section:last-child { border-bottom: none; margin-bottom: 0; }
        .section-title {
            color: var(--accent);
            font-size: 1.1rem;
            margin-bottom: 12px;
        }
        .info { line-height: 1.6; color: #cbd5e1; }
        .map-link {
            display: inline-block;
            margin: 8px 0;
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
        }
        .warning {
            background: rgba(251, 191, 36, 0.1);
            border-left: 4px solid var(--warning);
            padding: 14px;
            margin: 15px 0;
            font-size: 0.9rem;
            border-radius: 4px;
        }
        .flowchart {
            background: #1e2937;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95rem;
        }
        .flow-step {
            padding: 8px 0;
            border-left: 3px solid #38bdf8;
            padding-left: 12px;
            margin: 6px 0;
        }
        .disclaimer {
            font-size: 0.75rem;
            color: #94a3b8;
            background: #1e2937;
            padding: 12px;
            border-radius: 6px;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="goa-hub.html" class="back-btn">← GOA SECTOR HUB</a>
        <h1>GOA LOGISTICS INTEL</h1>
    </div>

    <div class="card">
        <select id="beach-select" onchange="loadLogistics()"></select>
        <div id="logistics-content"></div>
    </div>

    <script>
        const logisticsData = {
            "Arambol Beach": {
                hotels: "• <strong>Famafa Beach Resort</strong> (Top recommendation for surfers)",
                hotelMap: "https://www.google.com/maps/search/?api=1&query=Famafa+Beach+Resort+Arambol+Goa",
                restaurants: "Multiple beach shacks offering fresh seafood.",
                surfSchool: "Surf Wala / Goa Surf School",
                surfMap: "https://www.google.com/maps/search/?api=1&query=Surf+Wala+Arambol+Goa",
                transport: "Dabolim/Mopa Airport → Mapusa → Local bus/taxi → Scooter rental best.",
                budgetFlow: "1. Stay in beach hut or Famafa<br>2. Eat at local shacks<br>3. Rent scooter (₹400-600/day)<br>4. Surf school package",
                mustSee: "1. Arambol Sweet Lake<br>2. Paragliding Point<br>3. Querim Beach (silent)<br>4. Sunset Point<br>5. Hippie Market (Wed)"
            },
            "Ashwem Beach": {
                hotels: "• Ashwem Beach Resort / Babu Huts",
                hotelMap: "https://www.google.com/maps/search/?api=1&query=Ashwem+Beach+Resort+Goa",
                restaurants: "Calm beach shacks with good vegetarian options.",
                surfSchool: "Ashwem Surf School",
                surfMap: "https://www.google.com/maps/search/?api=1&query=Ashwem+Surf+School+Goa",
                transport: "Mapusa → Taxi/Scooter. Peaceful access roads.",
                budgetFlow: "1. Budget beach hut<br>2. Local shacks for meals<br>3. Shared scooter or bicycle<br>4. Surf lessons in package",
                mustSee: "1. Ashwem Beach Walk<br>2. Mandrem River<br>3. Kite Surfing Spot<br>4. Nearby Temples<br>5. Silent Night Beach"
            },
            "Mandrem Beach": {
                hotels: "• Vaayu Kula / Mandrem Beach Resort",
                hotelMap: "https://www.google.com/maps/search/?api=1&query=Vaayu+Kula+Mandrem+Goa",
                restaurants: "Relaxed beach cafes.",
                surfSchool: "Vaayu Surf School",
                surfMap: "https://www.google.com/maps/search/?api=1&query=Vaayu+Surf+School+Mandrem",
                transport: "Scooter from Arambol or Mapusa.",
                budgetFlow: "1. Yoga hut or budget resort<br>2. Beach cafe meals<br>3. Scooter rental<br>4. Surf + Yoga combo",
                mustSee: "1. Mandrem Beach<br>2. River Creek<br>3. Yoga & Wellness Spots<br>4. Jain Temple nearby<br>5. Sunset Dolphin Spot"
            },
            "Baga / Calangute": {
                hotels: "• Budget hotels slightly away from main road",
                hotelMap: "https://www.google.com/maps/search/?api=1&query=Baga+Beach+Budget+Hotels+Goa",
                restaurants: "Spice Rituals, Amavi, beach shacks.",
                surfSchool: "Big Wave Surf Club",
                surfMap: "https://www.google.com/maps/search/?api=1&query=Big+Wave+Surf+Club+Baga+Goa",
                transport: "Excellent connectivity - buses, taxis everywhere.",
                budgetFlow: "1. Hostel or budget hotel<br>2. Street food + shacks<br>3. Public transport/scooter<br>4. Group surf lessons",
                mustSee: "1. Baga Beach<br>2. Tito's Lane<br>3. Candolim Fort<br>4. Calangute Market<br>5. Anjuna Flea Market (nearby)"
            },
            "Agonda Beach": {
                hotels: "• Agonda Serenity Resort / The White Resort",
                hotelMap: "https://www.google.com/maps/search/?api=1&query=Agonda+Serenity+Resort+Goa",
                restaurants: "Manveer's Kitchen, Zest, Sea Breeze",
                surfSchool: "Agonda Surf School",
                surfMap: "https://www.google.com/maps/search/?api=1&query=Agonda+Surf+School+Goa",
                transport: "Margao → Taxi/Scooter.",
                budgetFlow: "1. Beach hut or mid-budget resort<br>2. Local restaurants<br>3. Scooter rental<br>4. Surf package",
                mustSee: "1. Agonda Beach<br>2. Cola Beach (nearby)<br>3. Butterfly Beach<br>4. Netravali Waterfall (day trip)<br>5. Palolem (short ride)"
            },
            "Palolem Beach": {
                hotels: "• Art Resort Palolem / Royal Touch Beach Huts",
                hotelMap: "https://www.google.com/maps/search/?api=1&query=Art+Resort+Palolem+Goa",
                restaurants: "Good variety of beach restaurants.",
                surfSchool: "Palolem Surfing School",
                surfMap: "https://www.google.com/maps/search/?api=1&query=Palolem+Surfing+School+Goa",
                transport: "Margao Railway / Airport well connected.",
                budgetFlow: "1. Beach hut<br>2. Local eateries<br>3. Rent scooter<br>4. Surf lessons",
                mustSee: "1. Palolem Beach Crescent<br>2. Silent Beach<br>3. Leopard Valley<br>4. Canacona Market<br>5. Butterfly Beach (boat)"
            }
        };

        function loadLogistics() {
            const beachName = document.getElementById('beach-select').value;
            const data = logisticsData[beachName];
            
            document.getElementById('logistics-content').innerHTML = `
                <h3 style="margin-top:0; color:#60a5fa;">${beachName}</h3>
                
                <div class="section">
                    <div class="section-title">🏨 Main Recommended Stay</div>
                    <div class="info">${data.hotels}</div>
                    <a href="${data.hotelMap}" target="_blank" class="map-link">📍 View Hotel on Google Maps →</a>
                </div>

                <div class="section">
                    <div class="section-title">🏄 Top Surf School</div>
                    <div class="info">${data.surfSchool}</div>
                    <a href="${data.surfMap}" target="_blank" class="map-link">📍 View Surf School on Google Maps →</a>
                </div>

                <div class="section">
                    <div class="section-title">🚕 Transport Options</div>
                    <div class="info">${data.transport}</div>
                </div>

                <div class="section">
                    <div class="section-title">🍽️ Food Scene</div>
                    <div class="info">${data.restaurants}</div>
                    <div class="warning">
                        <strong>Field Note:</strong> Check recent reviews and freshness in smaller shacks.
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">💰 Most Wallet-Friendly Budget Flow</div>
                    <div class="flowchart">
                        ${data.budgetFlow}
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">⭐ 5 Must-See Places</div>
                    <div class="info">${data.mustSee}</div>
                </div>

                <div class="disclaimer">
                    <strong>Disclaimer:</strong> All information is for guidance only and may become outdated. Prices, availability, and conditions can change rapidly. Always verify latest information on-site or via recent reviews.<br>
                    <strong>Last Updated:</strong> May 06, 2026
                </div>
            `;
        }

        window.onload = function() {
            const select = document.getElementById('beach-select');
            Object.keys(logisticsData).forEach(beach => {
                const option = document.createElement('option');
                option.value = beach;
                option.textContent = beach;
                select.appendChild(option);
            });
            loadLogistics();
        };
    </script>
</body>
</html>
