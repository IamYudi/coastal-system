<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOA LOGISTICS | Coastal Tactical Intelligence</title>
    <style>
        :root {
            --bg: #0a0f16;
            --card: #111827;
            --accent: #38bdf8;
            --warning: #fbbf24;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .back-btn { color: var(--accent); text-decoration: none; font-weight: bold; }
        h1 { margin: 0; color: #38bdf8; }
        
        .card {
            background: var(--card);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }
        select {
            width: 100%;
            padding: 14px;
            background: #1e2937;
            color: white;
            border: 1px solid var(--accent);
            border-radius: 8px;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        .section {
            margin-bottom: 22px;
            padding-bottom: 18px;
            border-bottom: 1px solid #334155;
        }
        .section:last-child { border-bottom: none; margin-bottom: 0; }
        .section-title {
            color: var(--accent);
            font-size: 1.1rem;
            margin-bottom: 12px;
        }
        .info { line-height: 1.6; color: #cbd5e1; }
        .map-link {
            display: inline-block;
            margin: 8px 0;
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
        }
        .warning {
            background: rgba(251, 191, 36, 0.1);
            border-left: 4px solid var(--warning);
            padding: 14px;
            margin: 15px 0;
            font-size: 0.9rem;
            border-radius: 4px;
        }
        .disclaimer {
            font-size: 0.75rem;
            color: #94a3b8;
            background: #1e2937;
            padding: 12px;
            border-radius: 6px;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="goa-hub.html" class="back-btn">← GOA SECTOR HUB</a>
        <h1>GOA LOGISTICS INTEL</h1>
    </div>

    <div class="card">
        <select id="beach-select" onchange="loadLogistics()"></select>
        <div id="logistics-content"></div>
    </div>

    <script>
        const logisticsData = {
            "Arambol Beach": {
                hotels: "• <strong>Famafa Beach Resort</strong> (Top recommendation for surfers - good location & value)",
                hotelMap: "https://www.google.com/maps/search/?api=1&query=Famafa+Beach+Resort+Arambol+Goa",
                restaurants: "Multiple beach shacks offering fresh seafood.",
                surfSchool: "Surf Wala / Goa Surf School",
                surfMap: "https://www.google.com/maps/search/?api=1&query=Surf+Wala+Arambol+Goa",
                transport: "Nearest airport: Dabolim (GOI) or Manohar International Airport. Local bus/taxi from Mapusa. Scooter rental highly recommended."
            },
            "Ashwem Beach": {
                hotels: "• Ashwem Beach Resort / Babu Huts",
                hotelMap: "https://www.google.com/maps/search/?api=1&query=Ashwem+Beach+Resort+Goa",
                restaurants: "Calm beach shacks with good vegetarian and seafood options.",
                surfSchool: "Ashwem Surf School",
                surfMap: "https://www.google.com/maps/search/?api=1&query=Ashwem+Surf+School+Goa",
                transport: "Taxi / bus from Mapusa. Easy scooter access. Less crowded access roads."
            },
            "Mandrem Beach": {
                hotels: "• Vaayu Kula (Premium) / Mandrem Beach Resort",
                hotelMap: "https://www.google.com/maps/search/?api=1&query=Vaayu+Kula+Mandrem+Goa",
                restaurants: "Relaxed beach cafes with good ambiance.",
                surfSchool: "Vaayu Surf School",
                surfMap: "https://www.google.com/maps/search/?api=1&query=Vaayu+Surf+School+Mandrem",
                transport: "Scooter from Arambol or Mapusa. Private taxi recommended."
            },
            "Baga / Calangute": {
                hotels: "• Budget hotels near beach road (avoid main noisy stretch)",
                hotelMap: "https://www.google.com/maps/search/?api=1&query=Baga+Beach+Hotels+Goa",
                restaurants: "Spice Rituals, Amavi, many beach shacks.",
                surfSchool: "Big Wave Surf Club",
                surfMap: "https://www.google.com/maps/search/?api=1&query=Big+Wave+Surf+Club+Baga+Goa",
                transport: "Very well connected. Frequent buses from Panjim/Mapusa. Plenty of taxis & rentals."
            },
            "Agonda Beach": {
                hotels: "• Agonda Serenity Resort / The White Resort",
                hotelMap: "https://www.google.com/maps/search/?api=1&query=Agonda+Serenity+Resort+Goa",
                restaurants: "Manveer's Kitchen, Zest, Sea Breeze",
                surfSchool: "Agonda Surf School",
                surfMap: "https://www.google.com/maps/search/?api=1&query=Agonda+Surf+School+Goa",
                transport: "Taxi from Margao or Palolem. Scooter rental available."
            },
            "Palolem Beach": {
                hotels: "• Art Resort Palolem / Royal Touch Beach Huts",
                hotelMap: "https://www.google.com/maps/search/?api=1&query=Art+Resort+Palolem+Goa",
                restaurants: "Good variety of beach restaurants.",
                surfSchool: "Palolem Surfing School",
                surfMap: "https://www.google.com/maps/search/?api=1&query=Palolem+Surfing+School+Goa",
                transport: "Well connected from Margao Railway Station / Airport."
            }
        };

        function loadLogistics() {
            const beachName = document.getElementById('beach-select').value;
            const data = logisticsData[beachName];
            
            document.getElementById('logistics-content').innerHTML = `
                <h3 style="margin-top:0; color:#60a5fa;">${beachName}</h3>
                
                <div class="section">
                    <div class="section-title">🏨 Main Recommended Stay</div>
                    <div class="info">${data.hotels}</div>
                    <a href="${data.hotelMap}" target="_blank" class="map-link">📍 View Hotel on Google Maps →</a>
                </div>

                <div class="section">
                    <div class="section-title">🏄 Top Surf School</div>
                    <div class="info">${data.surfSchool}</div>
                    <a href="${data.surfMap}" target="_blank" class="map-link">📍 View Surf School on Google Maps →</a>
                </div>

                <div class="section">
                    <div class="section-title">🚕 Transport Options</div>
                    <div class="info">${data.transport}</div>
                </div>

                <div class="section">
                    <div class="section-title">🍽️ Food Scene</div>
                    <div class="info">${data.restaurants}</div>
                    <div class="warning">
                        <strong>Field Note:</strong> In busy tourist areas, it is wise to check recent traveler feedback and observe general cleanliness before dining at smaller shacks.
                    </div>
                </div>

                <div class="disclaimer">
                    <strong>Disclaimer:</strong> Information is for guidance only and may become outdated. 
                    Prices, availability, and conditions can change. Always verify latest information.<br>
                    <strong>Last Updated:</strong> May 06, 2026
                </div>
            `;
        }

        window.onload = function() {
            const select = document.getElementById('beach-select');
            Object.keys(logisticsData).forEach(beach => {
                const option = document.createElement('option');
                option.value = beach;
                option.textContent = beach;
                select.appendChild(option);
            });
            loadLogistics();
        };
    </script>
</body>
</html>
