<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goa Coastal Intelligence Hub</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #0f1215; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        #sidebar { 
            position: absolute; top: 10px; right: 10px; width: 320px; 
            max-height: 90vh; background: rgba(15, 18, 21, 0.98); z-index: 1000;
            border: 1px solid #3498db; border-radius: 8px; padding: 15px;
            transition: 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
        }
        
        .toggle-btn { cursor: pointer; color: #3498db; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #2c3e50; padding-bottom: 5px; }
        #content-area { overflow-y: auto; flex-grow: 1; }
        
        .beach-link { 
            display: block; padding: 12px; margin: 8px 0; background: #1c2229;
            border-left: 3px solid #3498db; cursor: pointer; font-size: 0.9rem;
        }
        .beach-link:hover { background: #2c3e50; }

        .intel-header { color: #f1c40f; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #f1c40f; padding-bottom: 5px; }
        .section-title { color: #3498db; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin-top: 12px; display: block; }
        .intel-text { font-size: 0.85rem; line-height: 1.4; margin-bottom: 5px; color: #ced4da; }
        .danger-box { background: rgba(231, 76, 60, 0.2); border: 1px solid #e74c3c; padding: 8px; margin-top: 10px; border-radius: 4px; }
        .exit-footer { font-size: 0.75rem; color: #7f8c8d; text-align: center; margin-top: 15px; font-style: italic; border-top: 1px solid #2c3e50; padding-top: 10px; }

        .back-btn { position: absolute; top: 10px; left: 50px; z-index: 1000; background: #1c2229; color: #3498db; padding: 8px 15px; text-decoration: none; border-radius: 4px; border: 1px solid #3498db; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← COMMAND CENTER</a>

    <div id="sidebar">
        <span class="toggle-btn" id="sidebar-title" onclick="showList()">☰ GOA REGIONAL INDEX (15 SPOTS)</span>
        <a href="conditions.html" style="color:#f1c40f; margin-bottom:8px; display:block;">→ LIVE CONDITIONS</a>
        <div id="content-area"></div>
        
        <div id="disclaimer" style="font-size: 0.7rem; color: #95a5a6; border-top: 1px dashed #34495e; padding-top: 10px; margin-top: 10px;">
            <strong>OPERATIONAL NOTICE:</strong> Intelligence based on local surf knowledge and historical data. Goa changes drastically during monsoon. 
            <br><br>
            <em>Verify on-site. Respect lifeguards and turtle nesting zones.</em>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    var map = L.map('map', { zoomControl: false }).setView([15.40, 73.85], 10);
    L.control.zoom({ position: 'topleft' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const beachData = [
        { name: "Arambol Beach", coords: [15.685, 73.785], tide: "Best at mid to high tide. Multiple peaks.", seasons: "Prime Nov-Apr. Handles up to 7ft.", stay: "Budget huts and surf hostels on beach.", avoid: "Strong currents at northern rocky end.", crowds: "Moderate to High" },
        { name: "Ashwem Beach", coords: [15.625, 73.740], tide: "All tides work well.", seasons: "Nov-Mar best for beginners.", stay: "Quiet beach shacks and boutique stays.", avoid: "River mouth back-currents.", crowds: "Low to Moderate" },
        { name: "Mandrem Beach", coords: [15.635, 73.740], tide: "Low to mid tide for sandbars.", seasons: "Excellent for longboarding.", stay: "Yoga retreats and huts.", avoid: "Estuary currents.", crowds: "Moderate" },
        { name: "Morjim Beach", coords: [15.615, 73.730], tide: "Low to mid tide best.", seasons: "Good long rides. Turtle nesting area.", stay: "Quiet guesthouses.", avoid: "Respect turtle zones Nov-Mar.", crowds: "Low" },
        { name: "Baga / Calangute", coords: [15.555, 73.755], tide: "Incoming tide for shorebreak.", seasons: "Consistent small waves.", stay: "All budget options available.", avoid: "Jet skis and crowds.", crowds: "Extremely High" },
        { name: "Candolim Beach", coords: [15.52, 73.76], tide: "Mid to high tide.", seasons: "Good consistent waves.", stay: "Hotels and restaurants nearby.", avoid: "Water sports traffic.", crowds: "Moderate to High" },
        { name: "Sinquerim Beach", coords: [15.50, 73.77], tide: "Mid tide best.", seasons: "Fort Aguada views.", stay: "Near Candolim.", avoid: "Tourist boats.", crowds: "Moderate" },
        { name: "Vagator Beach", coords: [15.60, 73.73], tide: "High tide preferred.", seasons: "Cliff-backed powerful waves.", stay: "Chapora area stays.", avoid: "Rocks and strong currents.", crowds: "Moderate" },
        { name: "Anjuna Beach", coords: [15.58, 73.74], tide: "High tide best.", seasons: "Famous party + surf spot.", stay: "Many budget options.", avoid: "Strong rips in sections.", crowds: "High" },
        { name: "Agonda Beach", coords: [15.075, 73.985], tide: "Mid to high tide.", seasons: "Most consistent in South Goa.", stay: "Beach shacks and eco-resorts.", avoid: "Southern river currents.", crowds: "Moderate" },
        { name: "Betalbatim / Colva", coords: [15.25, 73.92], tide: "Sandbar dependent.", seasons: "Good groundswells.", stay: "Mid-range hotels.", avoid: "Rip currents near river mouths.", crowds: "Moderate" },
        { name: "Varca Beach", coords: [15.22, 73.93], tide: "All tides work well.", seasons: "Clean and consistent.", stay: "Resorts nearby.", avoid: "River mouth rips.", crowds: "Moderate" },
        { name: "Galgibaga Beach", coords: [15.035, 74.015], tide: "All tides.", seasons: "Peaceful South Goa spot.", stay: "Limited peaceful shacks.", avoid: "Turtle nesting restrictions.", crowds: "Very Low" },
        { name: "Cola Beach", coords: [15.30, 74.05], tide: "High tide preferred.", seasons: "Scenic lagoon + beach.", stay: "Eco stays.", avoid: "Steep access path.", crowds: "Low" },
        { name: "Palolem Beach", coords: [15.01, 74.02], tide: "High tide for safety.", seasons: "Good for beginners.", stay: "Iconic beach shacks.", avoid: "Rocks at ends during low tide.", crowds: "High" }
    ];

    const contentArea = document.getElementById('content-area');
    const sidebarTitle = document.getElementById('sidebar-title');

    function showList() {
        sidebarTitle.innerText = "☰ GOA REGIONAL INDEX (15 SPOTS)";
        contentArea.innerHTML = "";
        beachData.forEach(beach => {
            const link = document.createElement('div');
            link.className = 'beach-link';
            link.innerText = beach.name.toUpperCase();
            link.onclick = (e) => { e.stopPropagation(); selectBeach(beach); };
            contentArea.appendChild(link);
        });
    }

    function selectBeach(beach) {
        map.flyTo(beach.coords, 14);
        sidebarTitle.innerText = "← BACK TO LIST";
        contentArea.innerHTML = `
            <div class="intel-header">${beach.name}</div>
            <span class="section-title">Tide Intelligence</span><p class="intel-text">${beach.tide}</p>
            <span class="section-title">Seasonal Shifts</span><p class="intel-text">${beach.seasons}</p>
            <span class="section-title">Logistics</span><p class="intel-text">${beach.stay}</p>
            <span class="section-title">Expected Crowd</span><p class="intel-text">${beach.crowds}</p>
            <div class="danger-box">
                <span class="section-title" style="color:#ff4d4d; margin-top:0;">DANGER MITIGATION</span>
                <p class="intel-text">${beach.avoid}</p>
            </div>
            <div class="exit-footer">Click anywhere on map to exit • Respect Local Flags & Wildlife</div>
        `;
    }

    // Add markers to map
    beachData.forEach(beach => {
        const marker = L.marker(beach.coords).addTo(map);
        marker.on('mouseover', function() { 
            this.bindPopup(`<b>${beach.name}</b>`).openPopup(); 
        });
        marker.on('click', function(e) { 
            L.DomEvent.stopPropagation(e); 
            selectBeach(beach); 
        });
    });

    map.on('click', function() { showList(); });
    showList();
    </script>
</body>
</html>
